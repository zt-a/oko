<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OKO Dashboard{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg2:       #1a1d27;
      --bg3:       #22263a;
      --border:    #2e3347;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #6366f1;
      --error:     #ef4444;
      --warning:   #f59e0b;
      --info:      #3b82f6;
      --success:   #22c55e;
      --radius:    8px;
      --mono:      'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-brand {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-brand span { color: var(--accent); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      transition: color .15s;
    }
    nav a:hover { color: var(--text); }
    .nav-spacer { flex: 1; }
    .nav-version {
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }

    /* LAYOUT */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .stat-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 600;
      font-family: var(--mono);
      line-height: 1;
    }
    .stat-card.total  .value { color: var(--text); }
    .stat-card.errors .value { color: var(--error); }
    .stat-card.http   .value { color: var(--warning); }
    .stat-card.logs   .value { color: var(--info); }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label { color: var(--muted); font-size: 12px; margin-right: 4px; }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* TABLE */
    .events-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg2);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .events-table th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    .events-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .events-table tr:last-child td { border-bottom: none; }
    .events-table tr:hover td { background: var(--bg3); }
    .events-table a { color: var(--text); text-decoration: none; }
    .events-table a:hover { color: var(--accent); }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      font-family: var(--mono);
    }
    .badge.error   { background: rgba(239,68,68,.15);  color: #f87171; }
    .badge.warning { background: rgba(245,158,11,.15); color: #fbbf24; }
    .badge.info    { background: rgba(59,130,246,.15); color: #60a5fa; }
    .badge.default { background: rgba(100,116,139,.15);color: #94a3b8; }

    .status-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
    }
    .status-5xx { background: rgba(239,68,68,.2);  color: #f87171; }
    .status-4xx { background: rgba(245,158,11,.2); color: #fbbf24; }
    .status-ok  { background: rgba(34,197,94,.2);  color: #4ade80; }

    .method {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }

    .path { font-family: var(--mono); font-size: 12px; }
    .ts   { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .msg  { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* PAGINATION */
    .pagination {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      align-items: center;
    }
    .page-info { color: var(--muted); font-size: 12px; flex: 1; }
    .page-btn {
      padding: 6px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: all .15s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.disabled { opacity: .35; pointer-events: none; }

    /* DETAIL */
    .detail-header {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .detail-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      word-break: break-word;
    }
    .detail-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }
    .detail-meta span { display: flex; align-items: center; gap: 4px; }

    .section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-title {
      padding: 12px 20px;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    .section-body { padding: 16px 20px; }

    pre.stack {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--bg);
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
    }

    .context-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 6px 16px;
      font-size: 13px;
    }
    .context-key {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .context-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
    }

    /* BACK */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 20px;
      transition: color .15s;
    }
    .back-link:hover { color: var(--text); }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }
  </style>
</head>
<body>
  <nav>
    <a href="/oko/" class="nav-brand">👁 <span>OKO</span> Dashboard</a>
    <a href="/oko/">Events</a>
    <div class="nav-spacer"></div>
    <span class="nav-version">v0.1.0</span>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
